## Filebeat configuration
## https://github.com/elastic/beats/blob/main/deploy/docker/filebeat.docker.yml
#

name: filebeat

filebeat.config:
  modules:
    path: ${path.config}/modules.d/*.yml
    reload.enabled: false


filebeat.inputs:
  - type: tcp
    host: "0.0.0.0:10514"
    tags: ["syslog-ng", "rfc3164"]
    fields:
      log_source: "syslog-ng"
      log_transport: "tcp"
    pipeline: syslog
    processors:
      - syslog:
          field: message
          format: rfc3164
      - add_fields:
          target: '@metadata'
          fields:
            pipeline: syslog


filebeat.autodiscover:
  providers:
    # The Docker autodiscover provider automatically retrieves logs from Docker
    # containers as they start and stop.
    - type: docker
      hints.enabled: true
      hints.default_config:
        type: filestream
        id: docker-container-${data.container.id}
        paths:
          - /var/lib/docker/containers/${data.container.id}/*-json.log
        parsers:
          - container: ~
      templates:
        - condition:
            contains:
              docker.container.image: elasticsearch
          config:
            - module: elasticsearch
              server:
                input:
                  type: filestream
                  id: elasticsearch-server-${data.container.id}
                  paths:
                    - /var/lib/docker/containers/${data.container.id}/*-json.log
                  parsers:
                    - container: ~

processors:
  - add_cloud_metadata: ~

# Internal monitoring disabled (deprecated beats monitoring API in ES 9.x)
monitoring:
  enabled: false

# === INDEX TEMPLATE: 1 shard, 0 replicas (single-node, Fix 3) ===
setup.template.overwrite: true
setup.template.settings:
  index.number_of_shards: 1
  index.number_of_replicas: 0

# === ILM: rotate daily/500MB, delete after 7 days (Fix 4) ===
setup.ilm.overwrite: true
setup.ilm.policy_name: "filebeat"
setup.ilm.policy:
  phases:
    hot:
      actions:
        rollover:
          max_age: "1d"
          max_size: "500mb"
    delete:
      min_age: "7d"
      actions:
        delete: {}

output.elasticsearch:
  hosts: [ http://elasticsearch:9200 ]
  username: filebeat_internal
  password: ${FILEBEAT_INTERNAL_PASSWORD}
  # === Fix 2: riduce burst di ingest verso ES ===
  bulk_max_size: 500
  worker: 1

## HTTP endpoint for health checking
## https://www.elastic.co/docs/reference/beats/filebeat/http-endpoint
#

http:
  enabled: true
  host: 0.0.0.0
